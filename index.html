<script>
  // Rede de segurança: se algo falhar, mostra o erro na tela em vez de ficar em branco.
  function _mostraErro(msg){
    var r=document.getElementById('root');
    if(r&&!r.hasChildNodes()){
      r.innerHTML='<div style="max-width:560px;margin:60px auto;padding:24px;font-family:system-ui;'
        +'background:#fff;border:1px solid #E6DFD0;border-radius:16px;color:#2C3A2F">'

        +'<p style="color:#5C6B5E;font-size:14px;line-height:1.6">Detalhe técnico abaixo. '
        +'Se precisar, copie esta mensagem e envie para quem te ajuda.</p>'
        +'<pre style="background:#FBF9F3;padding:12px;border-radius:10px;font-size:12px;'
        +'white-space:pre-wrap;color:#C2784E">'+String(msg)+'</pre></div>';
    }
  }
  window.addEventListener('error',function(e){_mostraErro(e.message||e.error||e);});
  window.addEventListener('unhandledrejection',function(e){_mostraErro(e.reason||e);});
</script>

/* ════════════════════════════ LOGIN ════════════════════════════════════ */
function Login({ onEntrar }){
  const [email,setEmail]=useState(""); const [senha,setSenha]=useState("");
  const [erro,setErro]=useState(""); const [carregando,setCarregando]=useState(false);
  async function entrar(){
    setErro(""); setCarregando(true);
    const { error } = await sb.auth.signInWithPassword({ email:email.trim(), password:senha });
    setCarregando(false);
    if(error) setErro("E-mail ou senha incorretos."); else onEntrar();
  }
  const campo={ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:10,
    padding:"11px 13px", fontSize:14, width:"100%", outline:"none", color:C.ink };
  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2.5 mb-7 justify-center">
          <div className="rounded-xl flex items-center justify-center" style={{width:42,height:42,background:C.sage}}>
            <I.wallet color="#fff" size={20}/>
          </div>
          <div>
            <div className="font-display" style={{fontSize:20,fontWeight:600,lineHeight:1}}>Studio Pilates</div>
            <div style={{color:C.inkFaint,fontSize:12}}>Caixa · 2026</div>
          </div>
        </div>
        <div className="rounded-2xl p-6" style={{background:C.surface,border:`1px solid ${C.border}`}}>
          <h1 className="font-display" style={{fontSize:19,fontWeight:600,marginBottom:16}}>Entrar</h1>
          <div className="space-y-3">
            <input style={campo} type="email" placeholder="E-mail" value={email}
                   onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} />
            <input style={campo} type="password" placeholder="Senha" value={senha}
                   onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==="Enter"&&entrar()} />
          </div>
          {erro && <p style={{color:C.terra,fontSize:13,marginTop:10}}>{erro}</p>}
          <button onClick={entrar} disabled={carregando}
                  className="w-full mt-5 py-2.5 rounded-xl font-semibold text-white transition hover:opacity-90"

}

function App({ sessao }){
  const [view,setView]=useState("dashboard");
  const [profs,setProfs]=useState([]);
  const [pacientes,setPacientes]=useState([]);
  const [lancs,setLancs]=useState([]);
  const [carregando,setCarregando]=useState(true);
  const [erro,setErro]=useState("");
  const [modalLanc,setModalLanc]=useState(null); // null=fechado | "novo" | objeto p/ editar

  async function carregar(){
    setCarregando(true); setErro("");
    const [p1,p2,p3] = await Promise.all([
      sb.from("profissionais").select("*").order("nome"),
      sb.from("pacientes").select("*").eq("ativo",true).order("nome"),
      sb.from("vw_lancamentos").select("*"),
    ]);
    if(p1.error||p2.error||p3.error){ setErro("Não consegui carregar os dados. Confira a configuração e a conexão."); setCarregando(false); return; }
    setProfs(p1.data); setPacientes(p2.data); setLancs(p3.data); setCarregando(false);
  }
  useEffect(()=>{ carregar(); },[]);

  async function salvarLancamento(dados,id){
    let res;
    if(id) res = await sb.from("lancamentos").update(dados).eq("id",id);
    else   res = await sb.from("lancamentos").insert([dados]);
    if(res.error){ alert("Erro ao salvar: "+res.error.message); return false; }
    await carregar(); return true;
  }
  async function removerLancamento(id){
    const { error } = await sb.from("lancamentos").delete().eq("id",id);
    if(error){ alert("Erro ao remover: "+error.message); return; }
    setLancs(prev=>prev.filter(l=>l.id!==id));
  }
  async function addPaciente(nome,telefone){
    const { error } = await sb.from("pacientes").insert([{nome,telefone:telefone||null}]);
    if(error){ alert("Erro ao cadastrar: "+error.message); return false; }
    await carregar(); return true;
  }

  const nav=[
    {id:"dashboard",label:"Painel",icon:I.dash},
    {id:"lancamentos",label:"Lançamentos",icon:I.list},
    {id:"resultado",label:"Resultado",icon:I.table},
    {id:"pacientes",label:"Pacientes",icon:I.users},
  ];
  const corDe=(id)=>{ const i=profs.findIndex(p=>p.id===id); return CORES[(i<0?0:i)%CORES.length]; };

  return (
    <div className="flex w-full" style={{minHeight:"100vh"}}>
      {/* SIDEBAR */}
      <aside className="hidden md:flex flex-col w-64 shrink-0 sticky top-0"
             style={{height:"100vh",background:C.surface,borderRight:`1px solid ${C.border}`}}>
        <div className="px-6 pt-7 pb-6" style={{borderBottom:`1px solid ${C.borderSoft}`}}>
          <div className="flex items-center gap-2.5">
            <div className="rounded-xl flex items-center justify-center" style={{width:36,height:36,background:C.sage}}>
              <I.wallet color="#fff" size={18}/>
            </div>
            <div>
              <div className="font-display" style={{fontSize:18,fontWeight:600,lineHeight:1.05}}>Studio Pilates</div>
              <div style={{color:C.inkFaint,fontSize:12}}>Caixa · 2026</div>
            </div>
          </div>
        </div>
        <nav className="flex-1 px-3 py-4 space-y-1">
          {nav.map(n=>{ const Icon=n.icon; const a=view===n.id; return (
            <button key={n.id} onClick={()=>setView(n.id)}
              className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition"
              style={{background:a?C.sageSoft:"transparent",color:a?C.sageDeep:C.inkSoft,fontWeight:a?600:500}}>
              <Icon size={18} color={a?C.sageDeep:C.inkSoft}/>{n.label}
            </button> );})}
        </nav>
        <div className="p-3 space-y-2" style={{borderTop:`1px solid ${C.borderSoft}`}}>
          <button onClick={()=>setModalLanc("novo")}
            className="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-sm font-semibold text-white transition hover:opacity-90"
            style={{background:C.terra}}><I.plus size={17} color="#fff"/> Novo lançamento</button>
          <div className="flex items-center justify-between px-1 pt-1">
            <span style={{fontSize:11,color:C.inkFaint,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{sessao.user.email}</span>
            <button onClick={()=>sb.auth.signOut()} title="Sair" className="p-1.5 rounded-lg transition hover:opacity-70"><I.out size={16} color={C.inkFaint}/></button>
          </div>
        </div>
      </aside>

      {/* CONTEÚDO */}
      <main className="flex-1 min-w-0">
        <div className="md:hidden flex items-center gap-2 px-4 py-3 sticky top-0 z-10 overflow-x-auto"
             style={{background:C.surface,borderBottom:`1px solid ${C.border}`}}>
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setView(n.id)} className="px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap"
              style={{background:view===n.id?C.sageSoft:"transparent",color:view===n.id?C.sageDeep:C.inkSoft}}>{n.label}</button>
          ))}
          <button onClick={()=>sb.auth.signOut()} className="px-3 py-1.5 rounded-lg text-xs ml-auto" style={{color:C.inkFaint}}>Sair</button>
        </div>

        <div className="mx-auto px-5 md:px-9 py-7 md:py-9" style={{maxWidth:1120}}>
          {carregando && <Carregando/>}
          {!carregando && erro && <ErroBox msg={erro} onTentar={carregar}/>}
          {!carregando && !erro && <>
            {view==="dashboard"  && <Dashboard lancs={lancs} profs={profs} corDe={corDe}/>}

            {view==="pacientes"  && <Pacientes lancs={lancs} pacientes={pacientes} profs={profs} corDe={corDe} onAdd={addPaciente}/>}
          </>}
        </div>
      </main>

      {modalLanc && <ModalLancamento lancamento={modalLanc==="novo"?null:modalLanc} profs={profs} pacientes={pacientes}
                   onClose={()=>setModalLanc(null)}
                   onSave={async(dados,id)=>{ const ok=await salvarLancamento(dados,id); if(ok) setModalLanc(null); }}/>}
    </div>
  );
}

/* ── Agregações ────────────────────────────────────────────────────────── */
function useAgg(lancs,profs){
  return useMemo(()=>{
    const porMes = MESES.map((_,i)=>{ const idx=i+1;
      const total=lancs.filter(l=>l.mes===idx).reduce((s,l)=>s+Number(l.valor_studio),0);
      return {mes:MES_ABV[i],mesIdx:idx,total}; });
    const porOrigem = profs.map(p=>{
      const ls=lancs.filter(l=>l.profissional_id===p.id);
      return {...p, totalStudio:ls.reduce((s,l)=>s+Number(l.valor_studio),0),
                    totalBruto:ls.reduce((s,l)=>s+Number(l.valor_bruto),0)};
    });
    const totalAno=porMes.reduce((s,m)=>s+m.total,0);
    const comMov=porMes.filter(m=>m.total>0);
    const ultimo=comMov.length?comMov[comMov.length-1]:porMes[0];
    const media=comMov.length?totalAno/comMov.length:0;
    const ativos=new Set(lancs.filter(l=>l.paciente_id).map(l=>l.paciente_id)).size;
    return {porMes,porOrigem,totalAno,ultimo,media,ativos};
  },[lancs,profs]);
}

/* ── Gráficos em SVG puro (sem biblioteca externa) ─────────────────────── */
function GraficoBarras({data}){
  const W=520,H=240,padB=28,padT=14,padL=4,padR=4;
  const max=Math.max(...data.map(d=>d.total),1);
  const n=data.length, gap=8;
  const bw=(W-padL-padR-gap*(n-1))/n;
  const plotH=H-padB-padT;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}} preserveAspectRatio="xMidYMid meet">
      {[0,0.25,0.5,0.75,1].map((t,i)=>(
        <line key={i} x1={padL} x2={W-padR} y1={padT+plotH*t} y2={padT+plotH*t} stroke={C.borderSoft} strokeWidth="1" strokeDasharray="3 3"/>
      ))}
      {data.map((d,i)=>{
        const h=d.total/max*plotH;
        const x=padL+i*(bw+gap);
        const y=padT+plotH-h;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={Math.max(h,0)} rx="4" fill={d.total>0?C.sage:C.borderSoft}>
              <title>{`${d.mes}: ${brl(d.total)}`}</title>
            </rect>
            <text x={x+bw/2} y={H-9} textAnchor="middle" fontSize="11" fill={C.inkSoft} fontFamily="DM Sans">{d.mes}</text>
          </g>
        );
      })}
    </svg>
  );
}

function GraficoDonut({data,corDe}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const size=170, r=58, sw=22, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  let acc=0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height="170" style={{display:"block"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.borderSoft} strokeWidth={sw}/>
      {data.map((d)=>{
        const frac=d.value/total;
        const len=frac*circ;
        const seg=(
          <circle key={d.id} cx={cx} cy={cy} r={r} fill="none" stroke={corDe(d.id)} strokeWidth={sw}
            strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={-acc}
            transform={`rotate(-90 ${cx} ${cy})`}>
            <title>{`${d.name}: ${brl(d.value)}`}</title>
          </circle>
        );
        acc+=len; return seg;
      })}
    </svg>
  );
}

/* ── LANÇAMENTOS ───────────────────────────────────────────────────────── */
function Lancamentos({lancs,profs,corDe,onAdd,onEditar,onRemover}){
  const [fProf,setFProf]=useState("todas"); const [fMes,setFMes]=useState("todos"); const [busca,setBusca]=useState("");
  const [ordPag,setOrdPag]=useState(null); // null=padrão | "desc" | "asc"
  function clicarPagamento(){ setOrdPag(o=> o==="desc" ? "asc" : o==="asc" ? null : "desc"); }
  const filtrados=useMemo(()=>lancs
    .filter(l=>fProf==="todas"||l.profissional_id===fProf)
    .filter(l=>fMes==="todos"||l.mes===Number(fMes))
    .filter(l=>(l.paciente||"").toLowerCase().includes(busca.toLowerCase()))
    .sort((a,b)=>{
      if(ordPag){
        const da=a.data_pagamento||"", db=b.data_pagamento||"";
        if(da===db) return (a.paciente||"").localeCompare(b.paciente||"");
        if(!da) return 1; if(!db) return -1;            // sem data sempre por último
        return ordPag==="desc" ? db.localeCompare(da) : da.localeCompare(db);
      }
      return a.mes-b.mes||(a.paciente||"").localeCompare(b.paciente||"");
    }),[lancs,fProf,fMes,busca,ordPag]);
  const total=filtrados.reduce((s,l)=>s+Number(l.valor_bruto),0);
  const sel={background:C.surface,border:`1px solid ${C.border}`,color:C.ink,borderRadius:10,padding:"8px 12px",fontSize:13};
  return (
    <div>
      <PageTitle eyebrow="Movimentações" title="Lançamentos">
        <button onClick={onAdd} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white transition hover:opacity-90" style={{background:C.terra}}><I.plus size={16} color="#fff"/> Novo</button>
      </PageTitle>
      <Card className="p-4 mb-5">
        <div className="flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 px-3 rounded-lg flex-1" style={{border:`1px solid ${C.border}`,minWidth:180}}>
            <I.search size={15} color={C.inkFaint}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar paciente…" className="py-2 w-full" style={{outline:"none",background:"transparent",fontSize:13}}/>
          </div>
          <select value={fProf} onChange={e=>setFProf(e.target.value)} style={sel}>
            <option value="todas">Todas as origens</option>{profs.map(o=><option key={o.id} value={o.id}>{o.nome}</option>)}
          </select>
          <select value={fMes} onChange={e=>setFMes(e.target.value)} style={sel}>
            <option value="todos">Todos os meses</option>{MESES.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
          </select>
        </div>
      </Card>
      <Card className="overflow-hidden">
        <div className="flex items-center justify-between px-5 py-3" style={{borderBottom:`1px solid ${C.borderSoft}`,background:C.surfaceAlt}}>
          <span style={{fontSize:13,color:C.inkSoft}}>{filtrados.length} lançamento{filtrados.length!==1?"s":""}</span>
          <span style={{fontSize:13}}>Soma bruta: <b>{brl(total)}</b></span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full" style={{fontSize:13}}>
            <thead><tr style={{color:C.inkFaint,textAlign:"left"}}>
              <th className="px-5 py-2.5 font-medium">Paciente</th><th className="px-5 py-2.5 font-medium">Origem</th>
              <th className="px-5 py-2.5 font-medium">Mês</th>
              <th className="px-5 py-2.5 font-medium" style={{cursor:"pointer",userSelect:"none"}} onClick={clicarPagamento} title="Clique para ordenar por data">
                <span className="inline-flex items-center gap-1" style={{color:ordPag?C.sageDeep:"inherit"}}>Pagamento <span style={{fontSize:9}}>{ordPag==="desc"?"▼":ordPag==="asc"?"▲":"⇅"}</span></span>
              </th>
              <th className="px-5 py-2.5 font-medium" style={{textAlign:"right"}}>Valor</th><th className="px-3 py-2.5"></th>
            </tr></thead>
            <tbody>
              {filtrados.map(l=>(
                <tr key={l.id} style={{borderTop:`1px solid ${C.borderSoft}`}}>
                  <td className="px-5 py-2.5" style={{fontWeight:500}}>{l.paciente==="(consolidado)"?<span style={{color:C.inkFaint,fontStyle:"italic"}}>consolidado</span>:l.paciente}</td>
                  <td className="px-5 py-2.5"><span className="inline-flex items-center gap-1.5"><span className="rounded-full" style={{width:8,height:8,background:corDe(l.profissional_id)}}/><span style={{color:C.inkSoft}}>{l.profissional}</span></span></td>
                  <td className="px-5 py-2.5" style={{color:C.inkSoft}}>{MESES[l.mes-1]}</td>
                  <td className="px-5 py-2.5" style={{color:l.data_pagamento?C.inkSoft:C.inkFaint+"99"}}>{fmtDataPag(l.data_pagamento)}</td>
                  <td className="px-5 py-2.5" style={{textAlign:"right",fontWeight:600}}>{brl(l.valor_bruto)}</td>
                  <td className="px-3 py-2.5" style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    <button onClick={()=>onEditar(l)} className="p-1 rounded-md transition hover:opacity-70" title="Editar"><I.edit size={15} color={C.inkSoft}/></button>
                    <button onClick={()=>{if(confirm("Remover este lançamento?"))onRemover(l.id);}} className="p-1 rounded-md transition hover:opacity-70 ml-1" title="Remover"><I.x size={15} color={C.inkFaint}/></button>
                  </td>
                </tr>))}
              {filtrados.length===0 && <tr><td colSpan="6" className="px-5 py-10 text-center" style={{color:C.inkFaint}}>Nenhum lançamento encontrado.</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ── RESULTADO ─────────────────────────────────────────────────────────── */

    return {...o,meses,total:meses.reduce((s,v)=>s+v,0)};

                {o.meses.map((v,i)=><td key={i} className="px-3 py-2.5" style={{textAlign:"right",color:v?C.ink:C.inkFaint+"70"}}>{fmt(v)}</td>)}

            <td className="px-4 py-3 sticky left-0" style={{background:C.sageSoft,fontWeight:700,color:C.sageDeep}}>Total do mês</td>

      <p style={{color:C.inkFaint,fontSize:12,marginTop:12}}>Total do ano: <b style={{color:C.ink}}>{brl(totalAno)}</b> · valores líquidos para o caixa (Renata entra com repasse de 40%).</p>
    </div>
  );
}

/* ── PACIENTES ─────────────────────────────────────────────────────────── */
function Pacientes({lancs,pacientes,profs,corDe,onAdd}){
  const [busca,setBusca]=useState(""); const [novo,setNovo]=useState(false);
  const [nome,setNome]=useState(""); const [tel,setTel]=useState("");
  const lista=useMemo(()=>{
    const map={};
    for(const l of lancs){ if(!l.paciente_id) continue;
      if(!map[l.paciente_id]) map[l.paciente_id]={id:l.paciente_id,nome:l.paciente,total:0,meses:new Set(),origens:new Set()};
      map[l.paciente_id].total+=Number(l.valor_bruto); map[l.paciente_id].meses.add(l.mes); map[l.paciente_id].origens.add(l.profissional_id);
    }
    // inclui pacientes sem lançamento ainda
    for(const p of pacientes){ if(!map[p.id]) map[p.id]={id:p.id,nome:p.nome,total:0,meses:new Set(),origens:new Set()}; }
    return Object.values(map).map(p=>({...p,meses:p.meses.size,origens:[...p.origens]}))
      .filter(p=>p.nome.toLowerCase().includes(busca.toLowerCase())).sort((a,b)=>b.total-a.total);
  },[lancs,pacientes,busca]);
  const campo={background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",fontSize:14,width:"100%",outline:"none"};
  return (
    <div>
      <PageTitle eyebrow="Cadastro" title="Pacientes">
        <button onClick={()=>setNovo(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white transition hover:opacity-90" style={{background:C.terra}}><I.plus size={16} color="#fff"/> Novo paciente</button>
      </PageTitle>
      <div className="flex items-center gap-2 px-3 rounded-xl mb-5" style={{border:`1px solid ${C.border}`,background:C.surface,maxWidth:380}}>
        <I.search size={15} color={C.inkFaint}/>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar paciente…" className="py-2.5 w-full" style={{outline:"none",background:"transparent",fontSize:13}}/>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {lista.map(p=>(
          <Card key={p.id} className="p-4">
            <div className="flex items-center justify-between mb-2">
              <span className="font-display" style={{fontSize:16,fontWeight:600}}>{p.nome}</span>
              <span style={{fontSize:11,color:C.inkFaint}}>{p.meses} {p.meses===1?"mês":"meses"}</span>
            </div>
            <div style={{fontSize:22,fontWeight:600,color:C.sageDeep}}>{brl(p.total)}</div>
            <div className="flex flex-wrap gap-1.5 mt-3">{p.origens.map(oid=><span key={oid} className="px-2 py-0.5 rounded-full" style={{fontSize:10.5,background:corDe(oid)+"22",color:corDe(oid)}}>{(profs.find(x=>x.id===oid)||{}).nome||"—"}</span>)}</div>
          </Card>))}
      </div>
      {novo && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(44,58,47,0.4)"}} onClick={()=>setNovo(false)}>
          <div className="w-full rounded-2xl p-6" style={{maxWidth:400,background:C.surface}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5"><h2 className="font-display" style={{fontSize:20,fontWeight:600}}>Novo paciente</h2><button onClick={()=>setNovo(false)}><I.x size={18} color={C.inkSoft}/></button></div>
            <div className="space-y-3">
              <input style={campo} placeholder="Nome" value={nome} onChange={e=>setNome(e.target.value)} autoFocus/>
              <input style={campo} placeholder="Telefone (opcional)" value={tel} onChange={e=>setTel(e.target.value)}/>
            </div>
            <button disabled={!nome.trim()} onClick={async()=>{const ok=await onAdd(nome.trim(),tel.trim());if(ok){setNome("");setTel("");setNovo(false);}}}
              className="w-full mt-5 py-2.5 rounded-xl font-semibold text-white transition hover:opacity-90"
              style={{background:nome.trim()?C.terra:C.inkFaint,cursor:nome.trim()?"pointer":"not-allowed"}}>Cadastrar</button>
          </div>
        </div>)}
    </div>
  );
}

/* ── MODAL NOVO LANÇAMENTO ─────────────────────────────────────────────── */
function ModalLancamento({lancamento,profs,pacientes,onClose,onSave}){
  const ed=lancamento; // objeto da view quando é edição; null quando é novo
  const [profId,setProfId]=useState(ed?ed.profissional_id:(profs[0]?.id||""));
  const [pacId,setPacId]=useState(ed?(ed.paciente_id||""):"");
  const [descricao,setDescricao]=useState(ed&&!ed.paciente_id?(ed.paciente||""):"");
  const [mes,setMes]=useState(ed?ed.mes:(new Date().getMonth()+1));
  const [valor,setValor]=useState(ed?String(ed.valor_bruto):"");
  const [dataPag,setDataPag]=useState(ed?(ed.data_pagamento?String(ed.data_pagamento).slice(0,10):""):new Date().toISOString().slice(0,10));
  const [salvando,setSalvando]=useState(false);
  const prof=profs.find(p=>p.id===profId);
  // Mostra lista de pacientes para tipo='profissional'; descrição livre para 'servico'.
  // O RPG foi corrigido para 'profissional' no banco (05_fix_rpg.sql).
  const ehServico = prof?.tipo === "servico";
  const valido=Number(valor)>0 && profId && (pacId || descricao.trim());
  const campo={background:C.surfaceAlt,border:`1px solid ${C.border}`,color:C.ink,borderRadius:10,padding:"10px 12px",fontSize:14,width:"100%",outline:"none"};
  const label={fontSize:12,fontWeight:600,color:C.inkSoft,marginBottom:6,display:"block"};
  async function salvar(){
    setSalvando(true);
    const dados={ profissional_id:profId, ano:2026, mes, valor_bruto:Number(valor),
      paciente_id: pacId||null, descricao: pacId?null:(descricao.trim()||null),
      data_pagamento: dataPag||null };
    await onSave(dados, ed?ed.id:undefined); setSalvando(false);
  }
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(44,58,47,0.4)"}} onClick={onClose}>
      <div className="w-full rounded-2xl p-6" style={{maxWidth:440,background:C.surface}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5"><h2 className="font-display" style={{fontSize:20,fontWeight:600}}>{ed?"Editar lançamento":"Novo lançamento"}</h2><button onClick={onClose}><I.x size={18} color={C.inkSoft}/></button></div>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><label style={label}>Origem</label>
              <select value={profId} onChange={e=>{setProfId(e.target.value);setPacId("");setDescricao("");}} style={campo}>{profs.map(o=><option key={o.id} value={o.id}>{o.nome}</option>)}</select></div>
            <div><label style={label}>Mês</label>
              <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={campo}>{MESES.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
          </div>
          {!ehServico ? (
            <div><label style={label}>Paciente</label>
              <select value={pacId} onChange={e=>setPacId(e.target.value)} style={campo}>
                <option value="">Selecione…</option>{pacientes.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
              </select>
              <p style={{fontSize:11,color:C.inkFaint,marginTop:5}}>Paciente novo? Cadastre antes na aba Pacientes.</p>
            </div>
          ) : (
            <div><label style={label}>Descrição</label>
              <input style={campo} placeholder="Ex: Almofadas, aluguel…" value={descricao} onChange={e=>setDescricao(e.target.value)}/></div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <div><label style={label}>Valor recebido (R$)</label>
              <input style={campo} placeholder="0,00" inputMode="decimal" value={valor} onChange={e=>setValor(e.target.value.replace(",","."))}/>
            </div>
            <div><label style={label}>Data do pagamento</label>
              <input type="date" style={campo} value={dataPag} onChange={e=>setDataPag(e.target.value)}/>
            </div>
          </div>
          {prof && Number(prof.repasse_studio)<1 && Number(valor)>0 &&
            <p style={{fontSize:11,color:C.terra,marginTop:-6}}>Entra no caixa: {brl(Number(valor)*prof.repasse_studio)} (repasse {Math.round(prof.repasse_studio*100)}%)</p>}
        </div>
        <div className="flex gap-3 mt-6">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl font-semibold transition hover:opacity-80" style={{background:C.surfaceAlt,color:C.inkSoft,border:`1px solid ${C.border}`}}>Cancelar</button>
          <button disabled={!valido||salvando} onClick={salvar} className="flex-1 py-2.5 rounded-xl font-semibold text-white transition hover:opacity-90" style={{background:valido?C.terra:C.inkFaint,cursor:valido?"pointer":"not-allowed"}}>{salvando?"Salvando…":"Salvar"}</button>
        </div>
      </div>
    </div>
  );
}

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{ setSessao(data.session); setPronto(true); });
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSessao(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(!CONFIG_OK) return <ConfigAviso/>;
  if(!pronto) return <Carregando/>;
  if(!sessao) return <Login onEntrar={()=>{}}/>;
  return <App sessao={sessao}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

</script>
</body>
</html>
